name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  # to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # GitHub is the source of truth; HF Space is a deployment target.
          # Force-push to overwrite HF's auto-created starter (Dockerfile,
          # README, etc.) with whatever's on GitHub main.
          git push --force https://kofiAnimAY:$HF_TOKEN@huggingface.co/spaces/kofiAnimAY/DataScienceFinalProject main